name: Publish NuGet Package

on:
    workflow_dispatch:
    push:
        tags:
            - "v*.*.*"
        paths-ignore:
            - "**.md"
            - "**/*.gitignore"
            - "**/*.editorconfig"
            - "**/*.gitattributes"

env:
    DOTNET_VERSION: "9.0.x"
    PROJECT_PATH: "SortableBlazorHybrid/SortableBlazorHybrid.csproj"

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Extract version from tag
              id: version
              run: |
                  TAG=${{ github.ref_name }}
                  VERSION=${TAG#v}
                  echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
                  echo "Extracted version: $VERSION"

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ env.DOTNET_VERSION }}

            - name: Restore
              run: dotnet restore ${{ env.PROJECT_PATH }}

            - name: Build

              run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

            - name: Pack
              run: |
                  dotnet pack ${{ env.PROJECT_PATH }} \
                   --configuration Release \
                   --no-build -o ./nupkg \
                   -p:PackageVersion=${{ steps.version.outputs.VERSION }}

            - name: NuGet login (OIDC → temp API key)
              uses: NuGet/login@v1
              id: login
              with:
                    # Secret is your NuGet username, e.g. andrewlock
                user: DavidKroods

            - name: push to NuGet
                # Only push to NuGet if we're building a tag (optional)
              if: startsWith(github.ref, 'refs/tags/')
              shell: pwsh
                # Loop through all the packages in the output folder and push them to
                # nuget.org, using the NUGET_API_KEY generated by the previous login step
              run: |
                Get-ChildItem artifacts/package/release -Filter *.nupkg | ForEach-Object {
                    dotnet nuget push $_.FullName `
                    --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" `
                    --source https://api.nuget.org/v3/index.json
                }

